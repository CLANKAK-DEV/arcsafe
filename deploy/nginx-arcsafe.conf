# ArcSafe — nginx server block (fixes SEC-002)
# ---------------------------------------------------------------------------
# The frontend is a static export (`next build` with output:'export') served
# from the /arcsafe/ sub-path. A static export cannot emit its own response
# headers, so every security header below is set here, at the edge.
#
# Deploy:
#   1. Build:   BASE_PATH=/arcsafe npm --prefix frontend run build
#   2. Copy:    rsync -a frontend/out/  /var/www/arcsafe/
#   3. Install: copy this file to /etc/nginx/sites-available/arcsafe.conf,
#               symlink into sites-enabled, then: nginx -t && systemctl reload nginx
#   4. TLS:     certbot --nginx -d your-host  (replace the cert paths below)
#
# Verify afterwards:
#   curl -sI https://your-host/arcsafe/ | grep -iE \
#     'content-security-policy|strict-transport-security|x-frame-options|x-content-type-options|referrer-policy'

# ── Redirect all plain HTTP to HTTPS ───────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name your-host;            # ← replace with your domain / IP

    # Let certbot answer ACME challenges over HTTP, redirect everything else.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ── HTTPS ──────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name your-host;            # ← replace with your domain / IP

    # TLS — point these at your real certificate (certbot fills them in).
    ssl_certificate     /etc/letsencrypt/live/your-host/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-host/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Security response headers ──────────────────────────────────────────
    # `always` so they are sent on error responses (404/500) too, not just 200.
    #
    # CSP: this app talks to two Arc RPC endpoints and loads Google Fonts; it
    # runs no inline or remote scripts, so script-src stays 'self'. If you
    # self-host the fonts (recommended), drop the two font/style origins and
    # tighten to default-src 'self'.
    set $csp "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://rpc.testnet.arc.network https://arc-testnet.rpc.thirdweb.com; upgrade-insecure-requests";

    add_header Content-Security-Policy   $csp                                   always;
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options            "DENY"                                always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "no-referrer"                         always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin"                         always;

    # ── Static export at /arcsafe/ ─────────────────────────────────────────
    # `alias` maps the /arcsafe/ URL prefix onto the export directory, whose
    # files sit at the root of out/ (the basePath lives in the URL, not on disk).
    location /arcsafe/ {
        alias /var/www/arcsafe/;
        index index.html;
        # trailingSlash:true means routes are directories: /create/ -> create/index.html
        try_files $uri $uri/ $uri.html /arcsafe/404.html;
    }

    # Hashed build assets are immutable — cache them hard.
    location /arcsafe/_next/static/ {
        alias /var/www/arcsafe/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Anything outside the app sub-path is not ours.
    location = / { return 302 /arcsafe/; }

    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
